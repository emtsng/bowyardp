<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 700" preserveAspectRatio="xMidYMid slice">
  <!-- Concentric circles — perspective, strategy, depth of focus -->

  <!-- Crosshair axes through centre (1180, 350) -->
  <line x1="680" y1="350" x2="1440" y2="350" stroke="#B8962E" stroke-width="0.7" opacity="0.22"/>
  <line x1="1180" y1="0"   x2="1180" y2="700" stroke="#B8962E" stroke-width="0.7" opacity="0.22"/>

  <!-- 45° diagonal guides -->
  <line x1="1180" y1="350" x2="1480" y2="50"  stroke="#B8962E" stroke-width="0.5" opacity="0.12"/>
  <line x1="1180" y1="350" x2="880"  y2="50"  stroke="#B8962E" stroke-width="0.5" opacity="0.12"/>
  <line x1="1180" y1="350" x2="1480" y2="650" stroke="#B8962E" stroke-width="0.5" opacity="0.12"/>
  <line x1="1180" y1="350" x2="880"  y2="650" stroke="#B8962E" stroke-width="0.5" opacity="0.12"/>

  <!-- Concentric circles — outer to inner, increasing opacity -->
  <circle cx="1180" cy="350" r="400" fill="none" stroke="#B8962E" stroke-width="0.6" opacity="0.1"/>
  <circle cx="1180" cy="350" r="330" fill="none" stroke="#B8962E" stroke-width="0.75" opacity="0.16"/>
  <circle cx="1180" cy="350" r="260" fill="none" stroke="#B8962E" stroke-width="0.9" opacity="0.24"/>
  <circle cx="1180" cy="350" r="195" fill="none" stroke="#B8962E" stroke-width="1.1" opacity="0.36"/>
  <circle cx="1180" cy="350" r="132" fill="none" stroke="#B8962E" stroke-width="1.4" opacity="0.52"/>
  <circle cx="1180" cy="350" r="76"  fill="none" stroke="#B8962E" stroke-width="1.8" opacity="0.7"/>
  <circle cx="1180" cy="350" r="30"  fill="none" stroke="#B8962E" stroke-width="2.4" opacity="0.88"/>

  <!-- Centre focal dot -->
  <circle cx="1180" cy="350" r="4" fill="#B8962E" opacity="1"/>

  <!-- Tick marks on axes at each circle radius -->
  <line x1="1176" y1="350" x2="1176" y2="320" stroke="#B8962E" stroke-width="1" opacity="0.45" transform="translate(0,-76)"/>
  <line x1="1184" y1="350" x2="1184" y2="320" stroke="#B8962E" stroke-width="1" opacity="0.45" transform="translate(0,-76)"/>
</svg>
