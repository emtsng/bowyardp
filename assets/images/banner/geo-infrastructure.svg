<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 700" preserveAspectRatio="xMidYMid slice">
  <!-- Lattice transmission pylons, catenary conductors, wind turbine — Infrastructure, Power & PPP -->
  <defs>
    <pattern id="infragrid" width="70" height="70" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="70" y2="0" stroke="#B8962E" stroke-width="0.28"/>
      <line x1="0" y1="0" x2="0" y2="70" stroke="#B8962E" stroke-width="0.28"/>
    </pattern>
  </defs>
  <rect x="610" y="0" width="830" height="700" fill="url(#infragrid)" opacity="0.055"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- PYLON 1  (centre x=935, base y=650, crossarms y=105)          -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- LEG SECTION  y=650→420, wide A-frame -->
  <line x1="875" y1="650" x2="916" y2="420" stroke="#B8962E" stroke-width="1.2" opacity="0.58"/>
  <line x1="995" y1="650" x2="954" y2="420" stroke="#B8962E" stroke-width="1.2" opacity="0.58"/>
  <!-- Leg cross-members -->
  <line x1="875" y1="650" x2="995" y2="650" stroke="#B8962E" stroke-width="0.7" opacity="0.32"/>
  <line x1="888" y1="545" x2="982" y2="545" stroke="#B8962E" stroke-width="0.6" opacity="0.28"/>
  <line x1="916" y1="420" x2="954" y2="420" stroke="#B8962E" stroke-width="0.7" opacity="0.32"/>
  <!-- Leg X-bracing -->
  <line x1="875" y1="650" x2="982" y2="545" stroke="#B8962E" stroke-width="0.5" opacity="0.22"/>
  <line x1="995" y1="650" x2="888" y2="545" stroke="#B8962E" stroke-width="0.5" opacity="0.22"/>
  <line x1="888" y1="545" x2="954" y2="420" stroke="#B8962E" stroke-width="0.5" opacity="0.22"/>
  <line x1="982" y1="545" x2="916" y2="420" stroke="#B8962E" stroke-width="0.5" opacity="0.22"/>

  <!-- BODY SECTION  y=420→115, narrow near-vertical -->
  <line x1="916" y1="420" x2="921" y2="115" stroke="#B8962E" stroke-width="1.05" opacity="0.58"/>
  <line x1="954" y1="420" x2="949" y2="115" stroke="#B8962E" stroke-width="1.05" opacity="0.58"/>
  <!-- Body cross-members -->
  <line x1="918" y1="338" x2="952" y2="338" stroke="#B8962E" stroke-width="0.55" opacity="0.30"/>
  <line x1="919" y1="255" x2="951" y2="255" stroke="#B8962E" stroke-width="0.55" opacity="0.30"/>
  <line x1="920" y1="172" x2="950" y2="172" stroke="#B8962E" stroke-width="0.55" opacity="0.30"/>
  <!-- Body X-bracing (alternating panels) -->
  <line x1="916" y1="420" x2="952" y2="338" stroke="#B8962E" stroke-width="0.42" opacity="0.20"/>
  <line x1="954" y1="420" x2="918" y2="338" stroke="#B8962E" stroke-width="0.42" opacity="0.20"/>
  <line x1="919" y1="255" x2="950" y2="172" stroke="#B8962E" stroke-width="0.42" opacity="0.20"/>
  <line x1="951" y1="255" x2="920" y2="172" stroke="#B8962E" stroke-width="0.42" opacity="0.20"/>

  <!-- CROSSARMS at top (main + secondary) -->
  <line x1="860" y1="118" x2="1010" y2="118" stroke="#B8962E" stroke-width="1.4" opacity="0.72"/>
  <line x1="870" y1="137" x2="1000" y2="137" stroke="#B8962E" stroke-width="0.9" opacity="0.52"/>
  <!-- Peak triangle -->
  <line x1="921" y1="115" x2="935" y2="97"  stroke="#B8962E" stroke-width="0.9" opacity="0.52"/>
  <line x1="949" y1="115" x2="935" y2="97"  stroke="#B8962E" stroke-width="0.9" opacity="0.52"/>
  <circle cx="935" cy="96" r="2.5" fill="#B8962E" opacity="0.7"/>
  <!-- Insulator strings (3 per arm, hanging down) -->
  <line x1="860"  y1="118" x2="860"  y2="148" stroke="#B8962E" stroke-width="0.9" opacity="0.48"/>
  <line x1="935"  y1="118" x2="935"  y2="148" stroke="#B8962E" stroke-width="0.9" opacity="0.48"/>
  <line x1="1010" y1="118" x2="1010" y2="148" stroke="#B8962E" stroke-width="0.9" opacity="0.48"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- PYLON 2  (centre x=1242, 75 % scale, base y=605, arms y=140) -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <line x1="1198" y1="605" x2="1228" y2="420" stroke="#B8962E" stroke-width="0.95" opacity="0.44"/>
  <line x1="1286" y1="605" x2="1256" y2="420" stroke="#B8962E" stroke-width="0.95" opacity="0.44"/>
  <line x1="1198" y1="605" x2="1286" y2="605" stroke="#B8962E" stroke-width="0.55" opacity="0.25"/>
  <line x1="1205" y1="518" x2="1279" y2="518" stroke="#B8962E" stroke-width="0.5"  opacity="0.22"/>
  <line x1="1228" y1="420" x2="1256" y2="420" stroke="#B8962E" stroke-width="0.55" opacity="0.25"/>
  <!-- Leg X -->
  <line x1="1198" y1="605" x2="1279" y2="518" stroke="#B8962E" stroke-width="0.4" opacity="0.18"/>
  <line x1="1286" y1="605" x2="1205" y2="518" stroke="#B8962E" stroke-width="0.4" opacity="0.18"/>
  <!-- Body -->
  <line x1="1228" y1="420" x2="1232" y2="152" stroke="#B8962E" stroke-width="0.85" opacity="0.44"/>
  <line x1="1256" y1="420" x2="1252" y2="152" stroke="#B8962E" stroke-width="0.85" opacity="0.44"/>
  <line x1="1229" y1="338" x2="1255" y2="338" stroke="#B8962E" stroke-width="0.45" opacity="0.22"/>
  <line x1="1230" y1="255" x2="1254" y2="255" stroke="#B8962E" stroke-width="0.45" opacity="0.22"/>
  <!-- Body X (one panel) -->
  <line x1="1228" y1="420" x2="1255" y2="338" stroke="#B8962E" stroke-width="0.38" opacity="0.18"/>
  <line x1="1256" y1="420" x2="1229" y2="338" stroke="#B8962E" stroke-width="0.38" opacity="0.18"/>
  <!-- Crossarms -->
  <line x1="1188" y1="155" x2="1296" y2="155" stroke="#B8962E" stroke-width="1.1" opacity="0.55"/>
  <line x1="1196" y1="172" x2="1288" y2="172" stroke="#B8962E" stroke-width="0.75" opacity="0.40"/>
  <!-- Peak -->
  <line x1="1232" y1="152" x2="1242" y2="137" stroke="#B8962E" stroke-width="0.75" opacity="0.44"/>
  <line x1="1252" y1="152" x2="1242" y2="137" stroke="#B8962E" stroke-width="0.75" opacity="0.44"/>
  <!-- Insulators -->
  <line x1="1188" y1="155" x2="1188" y2="182" stroke="#B8962E" stroke-width="0.8" opacity="0.40"/>
  <line x1="1242" y1="155" x2="1242" y2="182" stroke="#B8962E" stroke-width="0.8" opacity="0.40"/>
  <line x1="1296" y1="155" x2="1296" y2="182" stroke="#B8962E" stroke-width="0.8" opacity="0.40"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- THREE CATENARY CONDUCTORS                                       -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Larger sag control points for visible catenary curve -->
  <path d="M  860,148 Q 1024,355 1188,182" fill="none" stroke="#B8962E" stroke-width="1.3" opacity="0.65"/>
  <path d="M  935,148 Q 1089,355 1242,182" fill="none" stroke="#B8962E" stroke-width="1.3" opacity="0.65"/>
  <path d="M 1010,148 Q 1153,355 1296,182" fill="none" stroke="#B8962E" stroke-width="1.3" opacity="0.65"/>

  <!-- Mid-sag accent — lowest point of centre conductor ≈ (1089,254) -->
  <circle cx="1089" cy="254" r="3" fill="#B8962E" opacity="0.82"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- WIND TURBINE  hub (1398,292), blades 160 px at 95°/215°/335° -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Mast to ground -->
  <line x1="1398" y1="292" x2="1398" y2="700" stroke="#B8962E" stroke-width="1.1" opacity="0.50"/>
  <!-- Nacelle (elongated box at hub) -->
  <rect x="1388" y="282" width="24" height="12" rx="3"
        fill="none" stroke="#B8962E" stroke-width="0.9" opacity="0.55"/>
  <!-- Blade 1: 95° → end ≈ (1384,132) -->
  <line x1="1398" y1="288" x2="1384" y2="132" stroke="#B8962E" stroke-width="1.0" opacity="0.50"/>
  <!-- Blade 2: 215° → end ≈ (1267,380) -->
  <line x1="1398" y1="288" x2="1267" y2="380" stroke="#B8962E" stroke-width="1.0" opacity="0.50"/>
  <!-- Blade 3: 335° → end ≈ (1547,355), clips at viewport -->
  <line x1="1398" y1="288" x2="1547" y2="355" stroke="#B8962E" stroke-width="1.0" opacity="0.50"/>
  <!-- Hub disc -->
  <circle cx="1398" cy="288" r="7"  fill="#B8962E" opacity="0.85"/>
  <circle cx="1398" cy="288" r="15" fill="none" stroke="#B8962E" stroke-width="0.9" opacity="0.45"/>
</svg>
