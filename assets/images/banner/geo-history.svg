<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 700" preserveAspectRatio="xMidYMid slice">
  <!--
    Ascending bow-wave arcs — all centred at (-300, 900), outside the canvas.
    Each arc sweeps from the upper-left area to the lower-right, evoking the
    forward motion of a ship's bow and the upward arc of a firm's history.
  -->

  <!-- r=800  from (0,158) to (475,700) -->
  <path d="M 0,158.4 A 800,800 0 0,1 474.6,700"
        fill="none" stroke="#B8962E" stroke-width="0.75" opacity="0.14"/>

  <!-- r=900  from (0,52) to (578,700) -->
  <path d="M 0,51.5 A 900,900 0 0,1 577.6,700"
        fill="none" stroke="#B8962E" stroke-width="0.85" opacity="0.2"/>

  <!-- r=1000 from (136,0) to (680,700) -->
  <path d="M 136,0 A 1000,1000 0 0,1 679.8,700"
        fill="none" stroke="#B8962E" stroke-width="1" opacity="0.27"/>

  <!-- r=1100 from (333,0) to (782,700) -->
  <path d="M 332.5,0 A 1100,1100 0 0,1 781.7,700"
        fill="none" stroke="#B8962E" stroke-width="1.15" opacity="0.36"/>

  <!-- r=1200 from (494,0) to (883,700) -->
  <path d="M 493.7,0 A 1200,1200 0 0,1 883.2,700"
        fill="none" stroke="#B8962E" stroke-width="1.3" opacity="0.47"/>

  <!-- r=1300 from (638,0) to (985,700) -->
  <path d="M 638,0 A 1300,1300 0 0,1 984.5,700"
        fill="none" stroke="#B8962E" stroke-width="1.5" opacity="0.6"/>

  <!-- r=1400 from (772,0) to (1086,700) -->
  <path d="M 772.4,0 A 1400,1400 0 0,1 1085.6,700"
        fill="none" stroke="#B8962E" stroke-width="1.7" opacity="0.75"/>

  <!-- r=1500 from (900,0) to (1183,700) — partially off-canvas right -->
  <path d="M 900,0 A 1500,1500 0 0,1 1182.4,700"
        fill="none" stroke="#B8962E" stroke-width="1.4" opacity="0.55"/>

  <!-- r=1600 from (1019,0) to (1275,700) -->
  <path d="M 1019,0 A 1600,1600 0 0,1 1274.6,700"
        fill="none" stroke="#B8962E" stroke-width="1.1" opacity="0.36"/>

  <!-- r=1700 from (1130,0) to (1363,700) -->
  <path d="M 1130,0 A 1700,1700 0 0,1 1362.5,700"
        fill="none" stroke="#B8962E" stroke-width="0.85" opacity="0.22"/>

  <!-- r=1800 — mostly off canvas, just a faint outer echo -->
  <path d="M 1235,0 A 1800,1800 0 0,1 1440,628"
        fill="none" stroke="#B8962E" stroke-width="0.65" opacity="0.13"/>

  <!-- Small horizon line at the convergence area -->
  <line x1="0" y1="700" x2="1440" y2="700" stroke="#B8962E" stroke-width="0.4" opacity="0.08"/>
</svg>
