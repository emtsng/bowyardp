<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 700" preserveAspectRatio="xMidYMid slice">
  <!-- Classical colonnade, dome, scales of justice — Government & Public Sector -->
  <defs>
    <pattern id="govlines" width="50" height="50" patternUnits="userSpaceOnUse" patternTransform="rotate(38 720 350)">
      <line x1="0" y1="0" x2="0" y2="50" stroke="#B8962E" stroke-width="0.32"/>
    </pattern>
  </defs>
  <rect x="620" y="0" width="820" height="700" fill="url(#govlines)" opacity="0.048"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- DOME — semicircular arc behind pediment (sweep=0 → arches UP) -->
  <!-- Radius = half chord = (1192-848)/2 = 172 px, centre x=1020  -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <path d="M 848,282 A 172,172 0 0,0 1192,282"
        fill="none" stroke="#B8962E" stroke-width="1.8" opacity="0.45"/>
  <!-- Inner dome echo -->
  <path d="M 880,282 A 140,140 0 0,0 1160,282"
        fill="none" stroke="#B8962E" stroke-width="0.9" opacity="0.26"/>
  <!-- Second inner echo -->
  <path d="M 912,282 A 108,108 0 0,0 1128,282"
        fill="none" stroke="#B8962E" stroke-width="0.55" opacity="0.16"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- PEDIMENT  (triangular gable above entablature)                 -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <line x1="840"  y1="284" x2="1020" y2="126" stroke="#B8962E" stroke-width="1.3" opacity="0.56"/>
  <line x1="1200" y1="284" x2="1020" y2="126" stroke="#B8962E" stroke-width="1.3" opacity="0.56"/>
  <!-- Inner tympanum -->
  <line x1="858"  y1="284" x2="1020" y2="148" stroke="#B8962E" stroke-width="0.7" opacity="0.32"/>
  <line x1="1182" y1="284" x2="1020" y2="148" stroke="#B8962E" stroke-width="0.7" opacity="0.32"/>
  <!-- Apex marker -->
  <circle cx="1020" cy="126" r="3.5" fill="#B8962E" opacity="0.75"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- ENTABLATURE  (3 horizontal bands above columns)                -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <line x1="835"  y1="296" x2="1205" y2="296" stroke="#B8962E" stroke-width="1.3" opacity="0.58"/>
  <line x1="835"  y1="312" x2="1205" y2="312" stroke="#B8962E" stroke-width="0.8" opacity="0.42"/>
  <line x1="835"  y1="325" x2="1205" y2="325" stroke="#B8962E" stroke-width="0.6" opacity="0.30"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- THREE COLUMNS  (40 px wide each, shaft y=325→648)             -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Column 1 — centre x=882 -->
  <line x1="862" y1="325" x2="862" y2="648" stroke="#B8962E" stroke-width="1.2" opacity="0.60"/>
  <line x1="902" y1="325" x2="902" y2="648" stroke="#B8962E" stroke-width="1.2" opacity="0.60"/>
  <!-- Fluting hints (horizontal drum lines inside shaft) -->
  <line x1="864" y1="400" x2="900" y2="400" stroke="#B8962E" stroke-width="0.45" opacity="0.18"/>
  <line x1="864" y1="475" x2="900" y2="475" stroke="#B8962E" stroke-width="0.45" opacity="0.18"/>
  <line x1="864" y1="550" x2="900" y2="550" stroke="#B8962E" stroke-width="0.45" opacity="0.18"/>
  <!-- Capital flare at top -->
  <line x1="855" y1="325" x2="909" y2="325" stroke="#B8962E" stroke-width="1.1" opacity="0.52"/>
  <!-- Base plinth -->
  <line x1="854" y1="648" x2="910" y2="648" stroke="#B8962E" stroke-width="1.1" opacity="0.52"/>
  <line x1="848" y1="660" x2="916" y2="660" stroke="#B8962E" stroke-width="0.8" opacity="0.38"/>

  <!-- Column 2 — centre x=1020 -->
  <line x1="1000" y1="325" x2="1000" y2="648" stroke="#B8962E" stroke-width="1.2" opacity="0.60"/>
  <line x1="1040" y1="325" x2="1040" y2="648" stroke="#B8962E" stroke-width="1.2" opacity="0.60"/>
  <line x1="1002" y1="400" x2="1038" y2="400" stroke="#B8962E" stroke-width="0.45" opacity="0.18"/>
  <line x1="1002" y1="475" x2="1038" y2="475" stroke="#B8962E" stroke-width="0.45" opacity="0.18"/>
  <line x1="1002" y1="550" x2="1038" y2="550" stroke="#B8962E" stroke-width="0.45" opacity="0.18"/>
  <line x1="993"  y1="325" x2="1047" y2="325" stroke="#B8962E" stroke-width="1.1" opacity="0.52"/>
  <line x1="992"  y1="648" x2="1048" y2="648" stroke="#B8962E" stroke-width="1.1" opacity="0.52"/>
  <line x1="986"  y1="660" x2="1054" y2="660" stroke="#B8962E" stroke-width="0.8" opacity="0.38"/>

  <!-- Column 3 — centre x=1158 -->
  <line x1="1138" y1="325" x2="1138" y2="648" stroke="#B8962E" stroke-width="1.2" opacity="0.60"/>
  <line x1="1178" y1="325" x2="1178" y2="648" stroke="#B8962E" stroke-width="1.2" opacity="0.60"/>
  <line x1="1140" y1="400" x2="1176" y2="400" stroke="#B8962E" stroke-width="0.45" opacity="0.18"/>
  <line x1="1140" y1="475" x2="1176" y2="475" stroke="#B8962E" stroke-width="0.45" opacity="0.18"/>
  <line x1="1140" y1="550" x2="1176" y2="550" stroke="#B8962E" stroke-width="0.45" opacity="0.18"/>
  <line x1="1131" y1="325" x2="1185" y2="325" stroke="#B8962E" stroke-width="1.1" opacity="0.52"/>
  <line x1="1130" y1="648" x2="1186" y2="648" stroke="#B8962E" stroke-width="1.1" opacity="0.52"/>
  <line x1="1124" y1="660" x2="1192" y2="660" stroke="#B8962E" stroke-width="0.8" opacity="0.38"/>

  <!-- Stylobate (platform steps) -->
  <line x1="840"  y1="672" x2="1200" y2="672" stroke="#B8962E" stroke-width="0.9" opacity="0.38"/>
  <line x1="828"  y1="684" x2="1212" y2="684" stroke="#B8962E" stroke-width="0.7" opacity="0.26"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- SCALES OF JUSTICE  centred at x=1335                          -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Shaft -->
  <line x1="1335" y1="210" x2="1335" y2="455" stroke="#B8962E" stroke-width="1.3" opacity="0.60"/>
  <!-- Top finial -->
  <line x1="1335" y1="210" x2="1335" y2="192" stroke="#B8962E" stroke-width="1.0" opacity="0.52"/>
  <circle cx="1335" cy="190" r="3.5" fill="#B8962E" opacity="0.68"/>
  <!-- Balance beam -->
  <line x1="1262" y1="252" x2="1408" y2="252" stroke="#B8962E" stroke-width="1.3" opacity="0.60"/>
  <!-- Pivot indicator -->
  <circle cx="1335" cy="252" r="5"   fill="#B8962E" opacity="0.85"/>
  <circle cx="1335" cy="252" r="11"  fill="none" stroke="#B8962E" stroke-width="0.9" opacity="0.46"/>

  <!-- LEFT PAN — suspended cords + pan bar -->
  <line x1="1262" y1="252" x2="1243" y2="350" stroke="#B8962E" stroke-width="0.9" opacity="0.52"/>
  <line x1="1262" y1="252" x2="1282" y2="350" stroke="#B8962E" stroke-width="0.9" opacity="0.52"/>
  <line x1="1232" y1="350" x2="1300" y2="350" stroke="#B8962E" stroke-width="1.6" opacity="0.62"/>

  <!-- RIGHT PAN — slightly lower (balanced scales with slight tilt) -->
  <line x1="1408" y1="252" x2="1388" y2="362" stroke="#B8962E" stroke-width="0.9" opacity="0.52"/>
  <line x1="1408" y1="252" x2="1428" y2="362" stroke="#B8962E" stroke-width="0.9" opacity="0.52"/>
  <line x1="1378" y1="362" x2="1440" y2="362" stroke="#B8962E" stroke-width="1.6" opacity="0.62"/>

  <!-- Base tripod -->
  <line x1="1335" y1="455" x2="1302" y2="482" stroke="#B8962E" stroke-width="1.0" opacity="0.48"/>
  <line x1="1335" y1="455" x2="1368" y2="482" stroke="#B8962E" stroke-width="1.0" opacity="0.48"/>
  <line x1="1290" y1="482" x2="1380" y2="482" stroke="#B8962E" stroke-width="1.1" opacity="0.48"/>

  <!-- Focal dot — pediment apex -->
  <circle cx="1020" cy="126" r="5"  fill="#B8962E" opacity="1"/>
  <circle cx="1020" cy="126" r="15" fill="none" stroke="#B8962E" stroke-width="1.1" opacity="0.52"/>
  <circle cx="1020" cy="126" r="30" fill="none" stroke="#B8962E" stroke-width="0.65" opacity="0.26"/>
</svg>
