<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 700" preserveAspectRatio="xMidYMid slice">
  <!-- Node network / circuit grid — data, digital, financial flows -->
  <defs>
    <pattern id="nodegrid" width="110" height="110" patternUnits="userSpaceOnUse">
      <circle cx="0"   cy="0"   r="2.4" fill="#B8962E" opacity="0.7"/>
      <circle cx="110" cy="0"   r="2.4" fill="#B8962E" opacity="0.7"/>
      <circle cx="0"   cy="110" r="2.4" fill="#B8962E" opacity="0.7"/>
      <line x1="0" y1="0" x2="110" y2="0"   stroke="#B8962E" stroke-width="0.45" opacity="0.45"/>
      <line x1="0" y1="0" x2="0"   y2="110" stroke="#B8962E" stroke-width="0.45" opacity="0.45"/>
      <line x1="0" y1="0" x2="110" y2="110" stroke="#B8962E" stroke-width="0.35" opacity="0.25"/>
    </pattern>
  </defs>

  <!-- Base node grid across right portion -->
  <rect x="700" y="0" width="740" height="700" fill="url(#nodegrid)" opacity="0.38"/>

  <!-- Highlighted path nodes (larger, brighter) -->
  <!-- Main highlighted circuit path -->
  <g stroke="#B8962E" fill="none">
    <line x1="920" y1="330" x2="1030" y2="220" stroke-width="1.6" opacity="0.65"/>
    <line x1="1030" y1="220" x2="1140" y2="330" stroke-width="1.6" opacity="0.65"/>
    <line x1="1140" y1="330" x2="1250" y2="220" stroke-width="1.6" opacity="0.65"/>
    <line x1="1250" y1="220" x2="1360" y2="330" stroke-width="1.6" opacity="0.65"/>
    <line x1="1030" y1="220" x2="1030" y2="110" stroke-width="1.2" opacity="0.5"/>
    <line x1="1250" y1="220" x2="1250" y2="110" stroke-width="1.2" opacity="0.5"/>
    <line x1="1140" y1="330" x2="1140" y2="440" stroke-width="1.2" opacity="0.5"/>
    <line x1="1140" y1="440" x2="1030" y2="550" stroke-width="1.2" opacity="0.5"/>
    <line x1="1140" y1="440" x2="1250" y2="550" stroke-width="1.2" opacity="0.5"/>
  </g>

  <!-- Featured nodes with rings -->
  <circle cx="1140" cy="330" r="7"  fill="#B8962E" opacity="1"/>
  <circle cx="1140" cy="330" r="16" fill="none" stroke="#B8962E" stroke-width="1.2" opacity="0.55"/>
  <circle cx="1140" cy="330" r="26" fill="none" stroke="#B8962E" stroke-width="0.7" opacity="0.28"/>

  <circle cx="1030" cy="220" r="5"  fill="#B8962E" opacity="0.9"/>
  <circle cx="1030" cy="220" r="12" fill="none" stroke="#B8962E" stroke-width="1"   opacity="0.45"/>

  <circle cx="1250" cy="220" r="5"  fill="#B8962E" opacity="0.9"/>
  <circle cx="1250" cy="220" r="12" fill="none" stroke="#B8962E" stroke-width="1"   opacity="0.45"/>

  <circle cx="1360" cy="330" r="4"  fill="#B8962E" opacity="0.8"/>
  <circle cx="920"  cy="330" r="4"  fill="#B8962E" opacity="0.8"/>
  <circle cx="1030" cy="110" r="3.5" fill="#B8962E" opacity="0.7"/>
  <circle cx="1250" cy="110" r="3.5" fill="#B8962E" opacity="0.7"/>
  <circle cx="1140" cy="440" r="4"  fill="#B8962E" opacity="0.8"/>
  <circle cx="1030" cy="550" r="3.5" fill="#B8962E" opacity="0.7"/>
  <circle cx="1250" cy="550" r="3.5" fill="#B8962E" opacity="0.7"/>
</svg>
