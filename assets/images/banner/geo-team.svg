<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 700" preserveAspectRatio="xMidYMid slice">
  <!-- Organic circle cluster — people, community, the human network of the firm -->

  <!-- Connecting lines between nearby circles (the network beneath the people) -->
  <g stroke="#B8962E" fill="none" stroke-width="0.7" opacity="0.22">
    <line x1="1160" y1="340" x2="1020" y2="255"/>
    <line x1="1160" y1="340" x2="1320" y2="260"/>
    <line x1="1160" y1="340" x2="1080" y2="470"/>
    <line x1="1160" y1="340" x2="1320" y2="260"/>
    <line x1="1160" y1="340" x2="1300" y2="450"/>
    <line x1="1160" y1="340" x2="1420" y2="360"/>
    <line x1="1020" y1="255" x2="870"  y2="300"/>
    <line x1="1020" y1="255" x2="1320" y2="260"/>
    <line x1="1020" y1="255" x2="1080" y2="140"/>
    <line x1="1320" y1="260" x2="1400" y2="165"/>
    <line x1="1320" y1="260" x2="1420" y2="360"/>
    <line x1="1080" y1="470" x2="870"  y2="440"/>
    <line x1="1080" y1="470" x2="1300" y2="450"/>
    <line x1="1080" y1="470" x2="1160" y2="580"/>
    <line x1="1300" y1="450" x2="1420" y2="490"/>
    <line x1="1300" y1="450" x2="1160" y2="580"/>
    <line x1="870"  y1="300" x2="870"  y2="440"/>
    <line x1="1080" y1="140" x2="1260" y2="100"/>
    <line x1="1080" y1="140" x2="1320" y2="260"/>
    <line x1="1400" y1="165" x2="1260" y2="100"/>
    <line x1="1420" y1="490" x2="1420" y2="360"/>
  </g>

  <!-- Background faint rings on major nodes (depth) -->
  <g fill="none" stroke="#B8962E">
    <circle cx="1160" cy="340" r="165" stroke-width="0.6" opacity="0.1"/>
    <circle cx="1160" cy="340" r="240" stroke-width="0.5" opacity="0.07"/>
    <circle cx="1160" cy="340" r="330" stroke-width="0.4" opacity="0.05"/>
  </g>

  <!-- Outer / peripheral circles — smallest, dimmest -->
  <g fill="none" stroke="#B8962E">
    <circle cx="1260" cy="100"  r="38" stroke-width="0.9" opacity="0.28"/>
    <circle cx="870"  cy="300"  r="50" stroke-width="0.9" opacity="0.28"/>
    <circle cx="870"  cy="440"  r="44" stroke-width="0.9" opacity="0.28"/>
    <circle cx="1160" cy="580"  r="42" stroke-width="0.9" opacity="0.28"/>
    <circle cx="1420" cy="490"  r="36" stroke-width="0.9" opacity="0.28"/>
  </g>

  <!-- Mid-size circles -->
  <g fill="none" stroke="#B8962E">
    <circle cx="1080" cy="140"  r="62" stroke-width="1.1" opacity="0.4"/>
    <circle cx="1400" cy="165"  r="68" stroke-width="1.1" opacity="0.4"/>
    <circle cx="1080" cy="470"  r="72" stroke-width="1.1" opacity="0.4"/>
    <circle cx="1420" cy="360"  r="58" stroke-width="1.1" opacity="0.4"/>
  </g>

  <!-- Large secondary circles -->
  <g fill="none" stroke="#B8962E">
    <circle cx="1020" cy="255" r="95"  stroke-width="1.3" opacity="0.55"/>
    <circle cx="1320" cy="260" r="105" stroke-width="1.3" opacity="0.55"/>
    <circle cx="1300" cy="450" r="90"  stroke-width="1.3" opacity="0.55"/>
  </g>

  <!-- Central / primary circle — the focal hub -->
  <circle cx="1160" cy="340" r="130" fill="none" stroke="#B8962E" stroke-width="1.7" opacity="0.72"/>
  <!-- Inner ring on central circle -->
  <circle cx="1160" cy="340" r="90"  fill="none" stroke="#B8962E" stroke-width="1.1" opacity="0.5"/>
  <circle cx="1160" cy="340" r="42"  fill="none" stroke="#B8962E" stroke-width="1.5" opacity="0.65"/>

  <!-- Centre dot -->
  <circle cx="1160" cy="340" r="4" fill="#B8962E" opacity="1"/>

  <!-- Small filled dots at each circle centre (the "people") -->
  <g fill="#B8962E" opacity="0.7">
    <circle cx="1020" cy="255" r="3"/>
    <circle cx="1320" cy="260" r="3"/>
    <circle cx="1300" cy="450" r="3"/>
    <circle cx="1080" cy="140" r="2.5"/>
    <circle cx="1400" cy="165" r="2.5"/>
    <circle cx="1080" cy="470" r="2.5"/>
    <circle cx="1420" cy="360" r="2.5"/>
  </g>
  <g fill="#B8962E" opacity="0.45">
    <circle cx="1260" cy="100" r="2"/>
    <circle cx="870"  cy="300" r="2"/>
    <circle cx="870"  cy="440" r="2"/>
    <circle cx="1160" cy="580" r="2"/>
    <circle cx="1420" cy="490" r="2"/>
  </g>
</svg>
