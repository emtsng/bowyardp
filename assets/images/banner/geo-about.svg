<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 700" preserveAspectRatio="xMidYMid slice">
  <!-- Two overlapping diamonds — the firm as a composite of disciplines -->
  <defs>
    <pattern id="aboutdots" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="22" cy="22" r="0.9" fill="#B8962E" opacity="0.6"/>
    </pattern>
  </defs>
  <!-- Subtle dot grid across right portion -->
  <rect x="640" y="0" width="800" height="700" fill="url(#aboutdots)" opacity="0.22"/>

  <!-- Diamond A — centred at (1040, 350), half-size 300 -->
  <polygon points="1040,50  1340,350 1040,650 740,350"  fill="none" stroke="#B8962E" stroke-width="0.7"  opacity="0.13"/>
  <polygon points="1040,100 1290,350 1040,600 790,350"  fill="none" stroke="#B8962E" stroke-width="0.85" opacity="0.2"/>
  <polygon points="1040,160 1230,350 1040,540 850,350"  fill="none" stroke="#B8962E" stroke-width="1"    opacity="0.3"/>
  <polygon points="1040,220 1170,350 1040,480 910,350"  fill="none" stroke="#B8962E" stroke-width="1.3"  opacity="0.45"/>
  <polygon points="1040,285 1105,350 1040,415 975,350"  fill="none" stroke="#B8962E" stroke-width="1.8"  opacity="0.65"/>

  <!-- Diamond B — centred at (1280, 350), half-size 260 -->
  <polygon points="1280,90  1540,350 1280,610 1020,350" fill="none" stroke="#B8962E" stroke-width="0.7"  opacity="0.12"/>
  <polygon points="1280,140 1490,350 1280,560 1070,350" fill="none" stroke="#B8962E" stroke-width="0.85" opacity="0.18"/>
  <polygon points="1280,195 1435,350 1280,505 1125,350" fill="none" stroke="#B8962E" stroke-width="1"    opacity="0.27"/>
  <polygon points="1280,250 1380,350 1280,450 1180,350" fill="none" stroke="#B8962E" stroke-width="1.3"  opacity="0.42"/>
  <polygon points="1280,305 1325,350 1280,395 1235,350" fill="none" stroke="#B8962E" stroke-width="1.8"  opacity="0.62"/>

  <!-- Axis lines — horizontal through both centres -->
  <line x1="700"  y1="350" x2="1560" y2="350" stroke="#B8962E" stroke-width="0.7" opacity="0.2"/>
  <!-- Vertical for Diamond A -->
  <line x1="1040" y1="0"   x2="1040" y2="700" stroke="#B8962E" stroke-width="0.6" opacity="0.16"/>
  <!-- Vertical for Diamond B -->
  <line x1="1280" y1="90"  x2="1280" y2="610" stroke="#B8962E" stroke-width="0.6" opacity="0.16"/>

  <!-- Connecting line between the two focal points -->
  <line x1="1040" y1="350" x2="1280" y2="350" stroke="#B8962E" stroke-width="1.2" opacity="0.4"/>

  <!-- Focal dots -->
  <circle cx="1040" cy="350" r="3.5" fill="#B8962E" opacity="0.9"/>
  <circle cx="1280" cy="350" r="3.5" fill="#B8962E" opacity="0.9"/>
  <!-- Midpoint dot -->
  <circle cx="1160" cy="350" r="2" fill="#B8962E" opacity="0.55"/>
</svg>
