<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 700" preserveAspectRatio="xMidYMid slice">
  <!-- Stacked architectural frames — blueprint / corporate structure -->
  <defs>
    <pattern id="sqgrid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#B8962E" stroke-width="0.45"/>
    </pattern>
  </defs>
  <!-- Fine square grid behind, right portion -->
  <rect x="680" y="0" width="760" height="700" fill="url(#sqgrid)" opacity="0.09"/>

  <!-- 5 rectangular frames, centred around (1200,350), each rotated slightly -->
  <!-- Frame 1 — outermost, barely visible -->
  <rect x="890" y="100" width="620" height="500" fill="none" stroke="#B8962E" stroke-width="0.8" opacity="0.13" transform="rotate(-4 1200 350)"/>
  <!-- Frame 2 -->
  <rect x="945" y="145" width="510" height="410" fill="none" stroke="#B8962E" stroke-width="1" opacity="0.22" transform="rotate(-2 1200 350)"/>
  <!-- Frame 3 -->
  <rect x="1000" y="190" width="400" height="320" fill="none" stroke="#B8962E" stroke-width="1.2" opacity="0.36" transform="rotate(2 1200 350)"/>
  <!-- Frame 4 -->
  <rect x="1055" y="235" width="290" height="230" fill="none" stroke="#B8962E" stroke-width="1.5" opacity="0.54" transform="rotate(-1 1200 350)"/>
  <!-- Frame 5 — innermost, brightest -->
  <rect x="1110" y="280" width="180" height="140" fill="none" stroke="#B8962E" stroke-width="2" opacity="0.78" transform="rotate(3 1200 350)"/>

  <!-- Cross-lines through centre of the frame stack -->
  <line x1="890" y1="350" x2="1510" y2="350" stroke="#B8962E" stroke-width="0.7" opacity="0.16" transform="rotate(-4 1200 350)"/>
  <line x1="1200" y1="100" x2="1200" y2="600" stroke="#B8962E" stroke-width="0.7" opacity="0.16" transform="rotate(-4 1200 350)"/>
  <line x1="1000" y1="350" x2="1400" y2="350" stroke="#B8962E" stroke-width="0.7" opacity="0.26" transform="rotate(2 1200 350)"/>
  <line x1="1200" y1="190" x2="1200" y2="510" stroke="#B8962E" stroke-width="0.7" opacity="0.26" transform="rotate(2 1200 350)"/>
  <line x1="1110" y1="350" x2="1290" y2="350" stroke="#B8962E" stroke-width="1" opacity="0.42" transform="rotate(3 1200 350)"/>
  <line x1="1200" y1="280" x2="1200" y2="420" stroke="#B8962E" stroke-width="1" opacity="0.42" transform="rotate(3 1200 350)"/>

  <!-- Centre registration mark -->
  <circle cx="1200" cy="350" r="3" fill="none" stroke="#B8962E" stroke-width="1.5" opacity="0.7"/>
  <circle cx="1200" cy="350" r="1.5" fill="#B8962E" opacity="0.8"/>
</svg>
