<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 700" preserveAspectRatio="xMidYMid slice">
  <!-- Nested flame silhouettes + radiating energy rings — Energy & Natural Resources -->
  <defs>
    <pattern id="enwv" width="50" height="26" patternUnits="userSpaceOnUse">
      <path d="M0,13 Q12,0 25,13 Q38,26 50,13" fill="none" stroke="#B8962E" stroke-width="0.38"/>
    </pattern>
  </defs>
  <rect x="610" y="0" width="830" height="700" fill="url(#enwv)" opacity="0.07"/>

  <!-- Concentric energy rings from core, centred at (1105,340) -->
  <circle cx="1105" cy="340" r="55"  fill="none" stroke="#B8962E" stroke-width="0.5"  opacity="0.09"/>
  <circle cx="1105" cy="340" r="108" fill="none" stroke="#B8962E" stroke-width="0.55" opacity="0.13"/>
  <circle cx="1105" cy="340" r="168" fill="none" stroke="#B8962E" stroke-width="0.60" opacity="0.17"/>
  <circle cx="1105" cy="340" r="235" fill="none" stroke="#B8962E" stroke-width="0.65" opacity="0.14"/>
  <circle cx="1105" cy="340" r="308" fill="none" stroke="#B8962E" stroke-width="0.70" opacity="0.09"/>

  <!-- FLAME 1 — outermost, tallest (base 595, tip 84) -->
  <!-- Left side: two cubic segments from base-centre up the left belly to tip -->
  <!-- Right side: perfect mirror -->
  <path d="M 1105,595
           C  993,516  948,376 1008,258
           C 1047,180 1084,128 1105,84
           C 1126,128 1163,180 1202,258
           C 1262,376 1217,516 1105,595 Z"
        fill="none" stroke="#B8962E" stroke-width="1.4" opacity="0.44"/>

  <!-- FLAME 2 — middle (base 528, tip 120) -->
  <path d="M 1105,528
           C 1012,460  974,342 1028,242
           C 1062,182 1091,148 1105,120
           C 1119,148 1148,182 1182,242
           C 1236,342 1198,460 1105,528 Z"
        fill="none" stroke="#B8962E" stroke-width="1.5" opacity="0.60"/>

  <!-- FLAME 3 — inner (base 460, tip 158) -->
  <path d="M 1105,460
           C 1044,408 1018,326 1055,252
           C 1074,208 1094,176 1105,155
           C 1116,176 1136,208 1155,252
           C 1192,326 1166,408 1105,460 Z"
        fill="none" stroke="#B8962E" stroke-width="1.8" opacity="0.78"/>

  <!-- FLAME 4 — core, brightest (base 385, tip 205) -->
  <path d="M 1105,385
           C 1068,354 1054,305 1074,262
           C 1085,236 1097,218 1105,202
           C 1113,218 1125,236 1136,262
           C 1156,305 1142,354 1105,385 Z"
        fill="none" stroke="#B8962E" stroke-width="2.2" opacity="0.94"/>

  <!-- Focal dot — hottest point of inner flame -->
  <circle cx="1105" cy="268" r="5"  fill="#B8962E" opacity="1"/>
  <circle cx="1105" cy="268" r="14" fill="none" stroke="#B8962E" stroke-width="1.2" opacity="0.54"/>
  <circle cx="1105" cy="268" r="28" fill="none" stroke="#B8962E" stroke-width="0.7" opacity="0.28"/>
</svg>
